name: Build Binaries

on:
  workflow_dispatch:
    inputs:
      upload_to_release:
        description: "Upload validated binaries to the GitHub Release for pyproject.toml version"
        type: boolean
        default: false
      overwrite_existing_assets:
        description: "Delete only conflicting release assets before upload"
        type: boolean
        default: false
      publish_to_pypi:
        description: "Publish the Python package to PyPI using trusted publishing"
        type: boolean
        default: false

permissions:
  contents: read

jobs:
  build-binaries:
    name: Build ${{ matrix.name }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Windows x64
            os: windows-latest
            artifact: tax-reporting-windows-x64.zip
            binary: tax-reporting.exe
          - name: macOS arm64
            os: macos-latest
            artifact: tax-reporting-macos-arm64.tar.gz
            binary: tax-reporting
          - name: macOS x64
            os: macos-13
            artifact: tax-reporting-macos-x64.tar.gz
            binary: tax-reporting

    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Sync dependencies
        run: uv sync --locked

      - name: Run tests
        run: uv run pytest

      - name: Build onefile binary
        shell: bash
        run: |
          uv run --managed-python --python 3.13 \
            --with nuitka \
            --with ordered-set \
            --with zstandard \
            python -m nuitka \
            --mode=onefile \
            --output-dir=dist/nuitka \
            --output-filename="${{ matrix.binary }}" \
            --python-flag=-m \
            src/report_analyzer

      - name: Validate binary with aggregate example
        if: runner.os != 'Windows'
        shell: bash
        run: |
          chmod +x "dist/nuitka/${{ matrix.binary }}"
          ./dist/nuitka/${{ matrix.binary }} \
            --input-dir examples/inputs \
            --tax-year 2025 \
            --display-currency BGN \
            --output-dir output/examples
          test -f output/examples/aggregated_tax_report_2025.txt
          uv run python scripts/normalize_example_report.py \
            output/examples/aggregated_tax_report_2025.txt \
            output/examples/aggregated_tax_report_2025.normalized.txt
          git diff --no-index --exit-code \
            examples/expected/aggregated_tax_report_2025.normalized.txt \
            output/examples/aggregated_tax_report_2025.normalized.txt

      - name: Validate binary with aggregate example
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          .\dist\nuitka\${{ matrix.binary }} `
            --input-dir examples\inputs `
            --tax-year 2025 `
            --display-currency BGN `
            --output-dir output\examples
          if (!(Test-Path output\examples\aggregated_tax_report_2025.txt)) {
            throw "Missing output\examples\aggregated_tax_report_2025.txt"
          }
          uv run python scripts/normalize_example_report.py `
            output\examples\aggregated_tax_report_2025.txt `
            output\examples\aggregated_tax_report_2025.normalized.txt
          git diff --no-index --exit-code `
            examples\expected\aggregated_tax_report_2025.normalized.txt `
            output\examples\aggregated_tax_report_2025.normalized.txt
          if ($LASTEXITCODE -ne 0) {
            exit $LASTEXITCODE
          }

      - name: Package Windows artifact
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist\release | Out-Null
          Compress-Archive `
            -Path dist\nuitka\${{ matrix.binary }} `
            -DestinationPath dist\release\${{ matrix.artifact }} `
            -Force

      - name: Package macOS artifact
        if: runner.os != 'Windows'
        shell: bash
        run: |
          mkdir -p dist/release
          tar -czf "dist/release/${{ matrix.artifact }}" -C dist/nuitka "${{ matrix.binary }}"

      - name: Upload binary artifact
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.artifact }}
          path: dist/release/${{ matrix.artifact }}
          if-no-files-found: error

  collect-release-assets:
    name: Collect release assets
    runs-on: ubuntu-latest
    needs: build-binaries
    steps:
      - uses: actions/download-artifact@v4
        with:
          pattern: binary-*
          path: dist/release
          merge-multiple: true

      - name: Generate checksums
        shell: bash
        run: |
          cd dist/release
          shasum -a 256 \
            tax-reporting-windows-x64.zip \
            tax-reporting-macos-arm64.tar.gz \
            tax-reporting-macos-x64.tar.gz \
            > checksums.txt

      - name: Upload release assets
        uses: actions/upload-artifact@v4
        with:
          name: release-assets
          path: dist/release/*
          if-no-files-found: error

  upload-release:
    name: Upload GitHub Release assets
    runs-on: ubuntu-latest
    needs: collect-release-assets
    if: ${{ inputs.upload_to_release }}
    permissions:
      contents: write
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          name: release-assets
          path: dist/release

      - name: Resolve version
        id: version
        shell: bash
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "tag=v${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Create release if needed
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          if ! gh release view "$TAG" >/dev/null 2>&1; then
            gh release create "$TAG" --title "$TAG" --notes "Release $TAG"
          fi

      - name: Check existing release assets
        id: conflicts
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          mapfile -t EXISTING < <(gh release view "$TAG" --json assets --jq '.assets[].name')
          CONFLICTS=()
          for asset in \
            tax-reporting-windows-x64.zip \
            tax-reporting-macos-arm64.tar.gz \
            tax-reporting-macos-x64.tar.gz \
            checksums.txt
          do
            if printf '%s\n' "${EXISTING[@]}" | grep -Fxq "$asset"; then
              CONFLICTS+=("$asset")
            fi
          done

          if [ "${#CONFLICTS[@]}" -gt 0 ]; then
            printf 'conflicting assets:\n'
            printf -- '- %s\n' "${CONFLICTS[@]}"
            if [ "${{ inputs.overwrite_existing_assets }}" != "true" ]; then
              echo "Existing release assets found. Re-run with overwrite_existing_assets=true to replace only these assets."
              exit 1
            fi
            for asset in "${CONFLICTS[@]}"; do
              gh release delete-asset "$TAG" "$asset" -y
            done
          fi

      - name: Upload release assets
        shell: bash
        run: |
          TAG="${{ steps.version.outputs.tag }}"
          gh release upload "$TAG" \
            dist/release/tax-reporting-windows-x64.zip \
            dist/release/tax-reporting-macos-arm64.tar.gz \
            dist/release/tax-reporting-macos-x64.tar.gz \
            dist/release/checksums.txt

  publish-pypi:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: collect-release-assets
    if: ${{ inputs.publish_to_pypi }}
    permissions:
      contents: read
      id-token: write
    steps:
      - uses: actions/checkout@v4

      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Build package
        run: uv build

      - name: Publish package
        run: uv publish

  workflow-summary:
    name: Workflow summary
    runs-on: ubuntu-latest
    needs:
      - build-binaries
      - collect-release-assets
      - upload-release
      - publish-pypi
    if: always()
    steps:
      - uses: actions/checkout@v4

      - name: Write summary
        shell: bash
        run: |
          VERSION="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml", "rb"))["project"]["version"])')"
          TAG="v${VERSION}"
          {
            echo "## tax-reporting release workflow"
            echo
            echo "- version: ${VERSION}"
            echo "- release tag: ${TAG}"
            echo "- built artifacts:"
            echo "  - tax-reporting-windows-x64.zip"
            echo "  - tax-reporting-macos-arm64.tar.gz"
            echo "  - tax-reporting-macos-x64.tar.gz"
            echo "  - checksums.txt"
            echo "- binary validation result: ${{ needs.build-binaries.result }}"
            echo "- release asset collection result: ${{ needs.collect-release-assets.result }}"
            echo "- release upload requested: ${{ inputs.upload_to_release }}"
            echo "- release upload result: ${{ needs.upload-release.result }}"
            echo "- PyPI publish requested: ${{ inputs.publish_to_pypi }}"
            echo "- PyPI publish result: ${{ needs.publish-pypi.result }}"
          } >> "$GITHUB_STEP_SUMMARY"
